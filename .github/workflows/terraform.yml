name: Terraform

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

env:
  TOFU_VERSION: '1.11.1'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: OpenTofu Init (Root)
        run: tofu init -backend=false

      - name: OpenTofu Validate (Root)
        run: tofu validate

  validate-modules:
    name: Validate Modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - modules/iam
          - modules/step-functions/db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: tofu init -backend=false

      - name: OpenTofu Validate (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: tofu validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      # Warnings (e.g. unused declarations) are reported but do not fail the build;
      # only error-severity issues block.
      - name: Run TFLint
        run: tflint --recursive --format=compact --minimum-failure-severity=error

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          trivy-config: trivy.yaml
          exit-code: '1'
        continue-on-error: true

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli
